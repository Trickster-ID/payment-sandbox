services:
  sql-db:
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: payment_sandbox
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d payment_sandbox" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=root
      - DB_PASSWORD=secretpassword
      - DB_NAME=payment_sandbox
      - JWT_SECRET=supersecretkey
    depends_on:
      sql-db:
        condition: service_healthy # Ini memastikan backend jalan SETELAH db benar-benar siap
