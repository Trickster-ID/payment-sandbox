info:
  contact: {}
  description: Backend API for payment sandbox simulation.
  title: Payment Sandbox API
  version: "1.0"
paths:
  /admin/payment-intents:
    get:
      description: Admin lists payment intents with optional status filter
      parameters:
      - description: Payment intent status
        enum:
        - PENDING
        - SUCCESS
        - FAILED
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/payment-sandbox_app_shared_response.Envelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/payment-sandbox_app_modules_payment_models_entity.PaymentIntent'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/payment-sandbox_app_shared_response.Envelope'
            - properties:
                error:
                  $ref: '#/definitions/payment-sandbox_app_shared_response.ErrorPayload'
              type: object
        "403":
          description: Forbidden
          schema:
            allOf:
            - $ref: '#/definitions/payment-sandbox_app_shared_response.Envelope'
            - properties:
                error:
                  $ref: '#/definitions/payment-sandbox_app_shared_response.ErrorPayload'
              type: object
      security:
      - BearerAuth: []
      summary: List payment intents
      tags:
      - payment
  /admin/payment-intents/{id}/status:
    patch:
      consumes:
      - application/json
      description: Admin updates payment intent status to SUCCESS or FAILED
      parameters:
      - description: Payment intent ID
        in: path
        name: id
        required: true
        type: string
      - description: Payment status payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_modules_payment_handlers.UpdatePaymentIntentStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/payment-sandbox_app_shared_response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/app_modules_payment_handlers.PaymentIntentStatusUpdateResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/payment-sandbox_app_shared_response.Envelope'
            - properties:
                error:
                  $ref: '#/definitions/payment-sandbox_app_shared_response.ErrorPayload'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/payment-sandbox_app_shared_response.Envelope'
            - properties:
                error:
